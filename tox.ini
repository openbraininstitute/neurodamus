[base]
name = neurodamus

[tox]
envlist = format, unit, unit-ngv-mpi, unit-mpi, unit-allen-v1, baseline, integration-e2e, scientific
labels =
    local = format, unit-local-env, baseline, integration-e2e, scientific

[testenv]
deps =
    -r tests/requirements.txt
    coverage>=7.10.6
    pytest-cov>=7.0

[testenv:baseline]
deps =
    {[testenv]deps}
setenv =
    PYTHONPATH={toxinidir}
    COVERAGE_FILE = .coverage.baseline
commands =
    pytest --cov=neurodamus --cov-report=term-missing tests/test_import.py

[testenv:unit]
deps =
    {[testenv]deps}
    neuron-nightly
    morphio
    memray
setenv =
    NEURON_INIT_MPI=0
    PYTHONPATH={toxinidir}
    COVERAGE_FILE = .coverage.unit
    PYTEST_DEBUG_TEMPROOT={env:PYTEST_DEBUG_TEMPROOT}
allowlist_externals =
    {toxinidir}/ci/build_ndcore.sh
    sh
commands =
    {toxinidir}/ci/build_ndcore.sh {toxinidir}/neurodamus/data {toxinidir}/tests/mechanisms/common {toxworkdir}
    sh -c ". {toxworkdir}/.envfile && pytest -x --cov=neurodamus --cov-report=term-missing --forked {posargs:tests/unit}"

[testenv:unit-local-env]
# Uses locally-built NEURON (+ libsonatareport, libsonata, neurodamus-models)
# instead of neuron-nightly. Useful for testing conjoint breaking changes.
# Requires: NEURON on PATH (nrnivmodl) and PYTHONPATH (import neuron, libsonata).
# For integration-e2e/scientific: also NRNMECH_LIB_PATH, HOC_LIBRARY_PATH, etc.
# Set environment variables before calling tox (e.g. via shell profile or .envrc).
deps =
    {[testenv]deps}
    morphio
    memray
passenv = *
setenv =
    NEURON_INIT_MPI=1
    PYTHONPATH={toxinidir}:{env:PYTHONPATH:}
    PATH={envbindir}:{env:PATH}
    PYTEST_DEBUG_TEMPROOT={env:PYTEST_DEBUG_TEMPROOT}
allowlist_externals =
    {toxinidir}/ci/build_ndcore.sh
    sh
commands =
    {toxinidir}/ci/build_ndcore.sh {toxinidir}/neurodamus/data {toxworkdir}
    sh -c ". {toxworkdir}/.envfile && pytest -x --forked {posargs:tests/unit}"

[testenv:unit-ngv-mpi]
deps =
    {[testenv]deps}
    neuron-nightly
    morphio
    -r tests/unit-mpi/requirements.txt
passenv = OMPI_ALLOW_RUN_AS_ROOT,OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
setenv =
    PYTHONPATH={toxinidir}
    NEURON_INIT_MPI=1
    RDMAV_FORK_SAFE=1
    COVERAGE_FILE = .coverage.unit-ngv-mpi
    PYTEST_DEBUG_TEMPROOT={env:PYTEST_DEBUG_TEMPROOT}
allowlist_externals =
    {toxinidir}/ci/build_ndcore.sh
    sh
commands =
    {toxinidir}/ci/build_ndcore.sh -ngv {toxinidir}/neurodamus/data {toxinidir}/tests/mechanisms/ngv {toxworkdir}
    sh -c ". {toxworkdir}/.envfile && pytest -x --cov=neurodamus --cov-report=term-missing {posargs:tests/unit-ngv-mpi}"

[testenv:unit-mpi]
# Please you need to spack load neurodamus-models model=neocortex +coreneuron or use an equivalent spack virtual env
deps =
    {[testenv]deps}
    neuron-nightly
    memray
    -r tests/unit-mpi/requirements.txt
passenv = OMPI_ALLOW_RUN_AS_ROOT,OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
setenv =
    PYTHONPATH={toxinidir}
    NEURON_INIT_MPI=1
    RDMAV_FORK_SAFE=1
    COVERAGE_FILE = .coverage.unit-mpi
    PYTEST_DEBUG_TEMPROOT={env:PYTEST_DEBUG_TEMPROOT}
allowlist_externals =
    {toxinidir}/ci/build_ndcore.sh
    sh
commands =
    {toxinidir}/ci/build_ndcore.sh {toxinidir}/neurodamus/data {toxinidir}/tests/mechanisms/common {toxworkdir}
    sh -c ". {toxworkdir}/.envfile && pytest -x --cov=neurodamus --cov-report=term-missing {posargs:tests/unit-mpi}"

[testenv:unit-allen-v1]
deps =
    {[testenv]deps}
    neuron-nightly
    morphio
setenv =
    NEURON_INIT_MPI=0
    PYTHONPATH={toxinidir}
    COVERAGE_FILE = .coverage.unit-allen-v1
    PYTEST_DEBUG_TEMPROOT={env:PYTEST_DEBUG_TEMPROOT}
allowlist_externals =
    {toxinidir}/ci/build_ndcore.sh
    sh
commands =
    {toxinidir}/ci/build_ndcore.sh -allen_v1 {toxinidir}/neurodamus/data {toxinidir}/tests/mechanisms/Allen_V1 {toxworkdir}
    sh -c ". {toxworkdir}/.envfile && pytest -x --cov=neurodamus --cov-report=term-missing --forked {posargs:tests/unit-allen-v1}"

[testenv:integration-e2e]
# Please you need to spack load neurodamus-models model=neocortex +coreneuron or use an equivalent spack virtual env
passenv = *
setenv =
    PYTHONPATH={toxinidir}:{env:PYTHONPATH}
    HOC_LIBRARY_PATH={toxinidir}/neurodamus/data/hoc:{env:HOC_LIBRARY_PATH}
    NEURON_INIT_MPI=1
commands =
    python -c "import os; print(os.environ.get('HOC_LIBRARY_PATH', ''))"
    pytest -s -x --forked --durations=5 --durations-min=15 {posargs:tests/integration-e2e}

[testenv:scientific]
# Please you need to spack load neurodamus-models model=neocortex +coreneuron or use an equivalent spack virtual env
passenv = *
setenv =
    PYTHONPATH={toxinidir}:{env:PYTHONPATH}
    HOC_LIBRARY_PATH={toxinidir}/neurodamus/data/hoc:{env:HOC_LIBRARY_PATH}
    NEURON_INIT_MPI=1
commands =
    python -c "import os; print(os.environ.get('HOC_LIBRARY_PATH', ''))"
    pytest -s -x --forked --durations=5 --durations-min=15 {posargs:tests/scientific}

[testenv:lint]
skip_install = True
deps =
    ruff
commands =
    ruff format --check neurodamus
    ruff check neurodamus

[testenv:format]
skip_install = True
deps =
    ruff
commands =
    ruff format neurodamus
    ruff check --fix neurodamus

[testenv:docs]
changedir = docs
extras = docs
commands =
    make clean
    make html SPHINXOPTS=-W  # make warnings into errors with -W sphinx option
allowlist_externals = make
