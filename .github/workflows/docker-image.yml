name: Build and Push Docker Image

on:
  push:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      #- name: Log in to the Container registry
      #  uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
      #  with:
      #    registry: ${{ env.REGISTRY }}
      #    username: ${{ github.actor }}
      #    password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
              type=ref,event=tag

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            NEURODAMUS_COMMIT=${{ github.sha }}
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            neurodamus:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test
        run: >- 
          docker run
          -e OMPI_ALLOW_RUN_AS_ROOT=1
          -e OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          neurodamus:test
          /bin/bash -c 'source /opt/obi/env-neocortex.sh &&
                        uv pip install pytest pytest-forked pandas &&
                        cd /tmp/neurodamus &&
                        pytest -s -x --forked --durations=5 --durations-min=15 tests/integration-e2e &&
                        pytest -s -x --forked --durations=5 --durations-min=15 tests/scientific'

      #- name: Build Docker image
      #  id: push
      #  uses: docker/build-push-action@v7
      #  with:
      #    context: .
      #    build-args: |
      #      NEURODAMUS_COMMIT=${{ github.sha }}
      #    push: true
      #    tags: ${{ steps.meta.outputs.tags }}
      #    labels: ${{ steps.meta.outputs.labels }}
      #    cache-from: type=gha
      #    cache-to: type=gha,mode=max

