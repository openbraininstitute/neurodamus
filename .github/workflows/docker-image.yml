name: Build and Push Docker Image

on:
  push:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
              type=ref,event=tag

      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            NEURODAMUS_COMMIT=${{ github.sha }}
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test
        run: >-
          docker run
          -e OMPI_ALLOW_RUN_AS_ROOT=1
          -e OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          ${REGISTRY}/${IMAGE_NAME}:test
          /bin/bash -c 'source /opt/obi/env-neocortex.sh &&
                        uv pip install pytest pytest-forked pandas &&
                        cd /tmp/neurodamus &&
                        pytest -s -x --forked --durations=5 --durations-min=15 tests/integration-e2e &&
                        pytest -s -x --forked --durations=5 --durations-min=15 tests/scientific'

      - name: Push docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            NEURODAMUS_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
