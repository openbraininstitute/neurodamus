name: neurodamus unit test and coverage
on:
  pull_request:
    branches:
      - main
    paths:
      - 'neurodamus/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'ci/**'
      - 'pyproject.toml'
      - 'tox.ini'
      - 'requirements.txt'
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: '3.10'
          - os: ubuntu-24.04
            python-version: '3.11'
          - os: ubuntu-24.04
            python-version: '3.12'
          - os: ubuntu-24.04
            python-version: '3.13'
          - os: macOS-15
            python-version: '3.12'
      fail-fast: false

    steps:

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Checkout neurodamus repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.14"

    - name: Install dependencies
      run: |
        uv tool install --with tox-uv-bare tox
        uv tool install 'coverage[toml]'

    - name: Install ubuntu system dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get --yes -qq update
        sudo apt-get install -y libopenmpi-dev openmpi-bin

    - name: Install macOS system dependencies
      if: startsWith(matrix.os, 'macOS')
      run: |
        brew install hdf5-mpi openmpi  # macOS hdf5-mpi requires openmpi

    - name: Run tox baseline
      run: |
        tox -e baseline

    - name: Upload baseline coverage to Coveralls
      if: startsWith(matrix.python-version, '3.12')
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: .coverage.baseline
        flag-name: baseline
        parallel: true
        fail-on-error: false

    - name: Run tox unit
      run: |
        tox -e unit

    - name: Upload unit coverage to Coveralls
      if: startsWith(matrix.python-version, '3.12')
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: .coverage.unit
        flag-name: unit
        parallel: true
        fail-on-error: false

    - name: Run tox unit-mpi
      run: |
        tox -e unit-mpi

    - name: Upload unit-mpi coverage to Coveralls
      if: startsWith(matrix.python-version, '3.12')
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: .coverage.unit-mpi
        flag-name: unit-mpi
        parallel: true
        fail-on-error: false

    - name: Run tox unit-ngv-mpi
      run: |
        tox -e unit-ngv-mpi

    - name: Upload unit-ngv-mpi coverage to Coveralls
      if: startsWith(matrix.python-version, '3.12')
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: .coverage.unit-ngv-mpi
        flag-name: unit-ngv-mpi
        parallel: true
        fail-on-error: false

    - name: Run tox unit-allen-v1
      run: |
        tox -e unit-allen-v1

    - name: Upload unit-allen-v1 coverage to Coveralls
      if: startsWith(matrix.python-version, '3.12')
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: .coverage.unit-allen-v1
        flag-name: unit-allen-v1
        parallel: true
        fail-on-error: false

    - name: Finalize Coveralls parallel build
      if: startsWith(matrix.python-version, '3.12')
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
        fail-on-error: false
