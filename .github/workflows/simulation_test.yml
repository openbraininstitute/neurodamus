name: neurodamus build and test
on:
  schedule:
    # every evening at 20:00 UTC
    - cron: '0 20 * * *'
  pull_request:
    branches:
      - main
    paths:
      - 'neurodamus/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'ci/**'
      - 'pyproject.toml'
      - 'tox.ini'
      - 'requirements.txt'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      NEURON_BRANCH:
        description: 'NEURON branch to use'
        required: false
      LIBSONATA_REPORT_BRANCH:
        description: 'libsonatareport branch to use'
        required: false
      LIBSONATA_BRANCH:
        description: 'libsonata branch to use'
        required: false
      NEURODAMUS_MODELS_BRANCH:
        description: 'neurodamus-models branch to use'
        required: false

env:
  LIBSONATAREPORT_COMMIT: 2.0.0 
  LIBSONATA_COMMIT: v0.1.35
  NEURODAMUS_COMMIT: 4.2.1
  NEURODAMUS_MODELS_COMMIT: 1a3b8f98fbabefb34f255c1fe63f7d7a4422223f
  NEURON_COMMIT: 9.0.1
  RDMAV_FORK_SAFE: '1'
  BUILD_DIR: ${{ github.workspace }}/cache/build
  INSTALL_DIR: /opt/obi
  CMAKE_BUILD_TYPE: RelWithDebugInfo
  SCCACHE_DIR: ${{ github.workspace }}/cache/sccache
  UV_CACHE_DIR: ${{ github.workspace }}/cache/uv

jobs:
  simulation:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          #- os: ubuntu-latest
