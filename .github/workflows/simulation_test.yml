    - name: Install ubuntu system dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        apt-get --yes -qq update \
        && apt-get --yes -qq upgrade \
        && source ci/scripts/install-apt-dependencies.sh \
        && install-apt-dependencies \
        && apt-get --yes -qq --no-install-recommends install libhdf5-openmpi-dev python3-dev

    #- name: Setup Python
    #  uses: actions/setup-python@v6
    #  with:
    #    python-version: ${{ matrix.python-version }}

    - name: Upgrade pip and install base Python packages
      run: |
        uv venv --clear --python ${{ matrix.python-version }} venv \
        && source venv/bin/activate \
        && uv pip install --upgrade pip cmake ninja tox pytest pytest-coverage \
        && MPICC=mpicc uv pip install --no-binary=mpi4py mpi4py \
        && uv pip list

    - name: sccache build cache
      id: cache-sccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/cache
        key: sccache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: sccache-${{ runner.os }}-

    - name: Install sccache
      run: |
        mkdir -p ${{ github.workspace }}/cache \
        && source ci/scripts/install-sccache.sh \
        && install-sccache

    - name: Build h5py with the local hdf5
      run: |
        source ci/scripts/install-h5py.sh \
        && source venv/bin/activate \
        && PIP='uv pip' install-h5py

    - name: Install libsonatareport
      run: |
        source ci/scripts/build-libsonatareport.sh \
        && source venv/bin/activate \
        && build-libsonatareport $LIBSONATAREPORT_COMMIT

    - name: Install libsonata
      run: |
        source ci/scripts/build-libsonata.sh \
        && source venv/bin/activate \
        && PIP='uv pip' build-libsonata $LIBSONATA_COMMIT
        
    - name: Install neuron
      run: |
        source ci/scripts/build-neuron.sh \
        && source venv/bin/activate \
        && PIP='uv pip' build-neuron $NEURON_COMMIT

    - name: Install neurodamus
      run: |
        venv/bin/pip install .

    - name: Install neurodamus-models
      run: |
        source ci/scripts/build-neurodamus-models.sh \
        && source venv/bin/activate \
        && build-neocortex-models $NEURODAMUS_MODELS_COMMIT

    - name: Make env
      run: |
        source ci/scripts/make-env.sh \
        && source venv/bin/activate \
        && make-env

