          #  python-version: '3.11'
          #- os: ubuntu-22.04
          #  python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
          ## test macOS with one python version due to the cache size limits
          #- os: macOS-15
          #  python-version: '3.12'
      fail-fast: false

